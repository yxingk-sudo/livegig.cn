<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Test API</h1>
    <select id="companySelect">
        <option value="">Select Company</option>
        <option value="1">英皇娱乐</option>
        <option value="2">环球唱片</option>
        <option value="3">艺能制作</option>
    </select>
    <button onclick="testAPI()">Test</button>
    <div id="result"></div>
    
    <script>
    function testAPI() {
        const companyId = document.getElementById('companySelect').value;
        console.log('Testing with company ID:', companyId);
        
        fetch('api/get_company_projects.php?company_id=' + companyId)
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '<pre>Error: ' + error + '</pre>';
            });
    }
    </script>
</body>
</html>
